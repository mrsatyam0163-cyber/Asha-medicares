<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asha Medicare - Ashamed.com</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        header { background: #257aa1a4; color: white; padding: 15px; text-align: center; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        
        /* Admin Panel starts hidden */
        .admin-box { display: none; background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #ee00ff; }
        
        input { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        .search-bar { width: 100%; padding: 15px; margin-bottom: 20px; font-size: 16px; border-radius: 25px; border: 1px solid #ddd; }
        
        /* Delete button default hidden */
        .delete-btn { 
            display: none; 
            background: #ff4d4d; color: white; border: none; 
            padding: 8px; cursor: pointer; margin-top: 10px; 
            width: 100%; border-radius: 4px; font-weight: bold;
        }
        .delete-btn:hover { background: #cc0000; }
    </style>
</head>
<body>

<header>
    <h1>Asha Medicare</h1>
</header>

<div class="container">
    <div class="admin-box" id="adminPanel">
        <h3 style="margin-top:0;">Naya Product Add Karein (Admin Mode)</h3>
        <input type="text" id="name" placeholder="Medicine Name">
        <input type="number" id="mrp" placeholder="MRP Price">
        <input type="number" id="disc" placeholder="Discount %">
        <input type="text" id="img" placeholder="Image Link (URL)">
        <button onclick="saveProduct()" style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Add to Website</button>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="Search medicines here..." onkeyup="search()">

    <div class="product-grid" id="display"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDkIoeLl4iLcuqELV0eCvIe5asAmwacWwI",
        authDomain: "asha-medicare-41262.firebaseapp.com",
        projectId: "asha-medicare-41262",
        storageBucket: "asha-medicare-41262.firebasestorage.app",
        messagingSenderId: "1059351175957",
        appId: "1:1059351175957:web:800af0ae45784b39d5bf1c",
        databaseURL: "https://asha-medicare-41262-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- ADMIN CHECK LOGIC ---
    const params = new URLSearchParams(window.location.search);
    const isAdmin = params.get('login') === 'captain';

    if(isAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
    }

    let globalInventory = [];

    db.ref('medicines').on('value', (snapshot) => {
        const data = snapshot.val();
        globalInventory = [];
        for (let id in data) {
            globalInventory.push({ id, ...data[id] });
        }
        renderData(globalInventory);
    });

    function saveProduct() {
        let name = document.getElementById('name').value;
        let mrp = document.getElementById('mrp').value;
        let disc = document.getElementById('disc').value;
        let img = document.getElementById('img').value || 'https://via.placeholder.com/150';

        if(name && mrp) {
            db.ref('medicines').push({ name, mrp, disc, img })
            .then(() => {
                alert("Success: Item added to inventory!");
                document.getElementById('name').value = '';
                document.getElementById('mrp').value = '';
                document.getElementById('disc').value = '';
                document.getElementById('img').value = '';
            });
        } else {
            alert("Please enter Name and Price!");
        }
    }

    function renderData(list) {
        let html = '';
        list.forEach((item) => {
            let salesRate = item.mrp - (item.mrp * (item.disc || 0) / 100);
            
            // Delete button ka display style handle karna
            let deleteStyle = isAdmin ? 'display:block;' : 'display:none;';

            html += `
                <div class="card">
                    <img src="${item.img}" alt="${item.name}">
                    <h4 style="margin:10px 0;">${item.name}</h4>
                    <p style="margin:5px 0;">MRP: ₹<del>${item.mrp}</del></p>
                    <p style="color:green; margin:5px 0;">Disc: ${item.disc}%</p>
                    <p style="font-size:1.1em;"><b>Price: ₹${salesRate.toFixed(2)}</b></p>
                    <button class="delete-btn" style="${deleteStyle}" onclick="removeProduct('${item.id}')">Delete Product</button>
                </div>
            `;
        });
        document.getElementById('display').innerHTML = html;
    }

    function search() {
        let term = document.getElementById('search').value.toLowerCase();
        let filtered = globalInventory.filter(i => i.name.toLowerCase().includes(term));
        renderData(filtered);
    }

    function removeProduct(id) {
        if(confirm("Kya aap sach mein is product ko remove karna chahte hain?")) {
            db.ref('medicines/' + id).remove();
        }
    }
</script>
</body>
</html>
